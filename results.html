<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Results</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="./style.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Export Libraries -->
<script defer src="./xlsx.js"></script>
<script defer src="./html2pdf.js"></script>
<link rel="icon" type="image/png" sizes="16x16" href="./PrePa_favicon.png">
</head>

<body class="min-vh-100 bg-light text-dark">

  
<!-- HEADER -->
<header class="bg-white shadow-sm position-sticky top-0" style="z-index: 1000;">
  <div class="container px-4 py-3 d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center gap-3 animate-fade-in">
      <img src="./logo.jpg" alt="Logo" class="rounded shadow-sm" style="width:48px;height:48px">
      <h1 class="h5 fw-bold mb-0">Exam Performance</h1>
    </div>
    <div class="d-flex gap-2 animate-fade-in">
      <button onclick="window.location.href='index.html'" class="btn btn-outline-secondary btn-sm">Home</button>
      <button onclick="window.location.href='admin.html'" class="btn btn-primary btn-sm">Admin</button>
    </div>
  </div>
</header>

<!-- MAIN CONTENT -->
<main id="result-page" class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card border-0 shadow-lg animate-scale-in hover-lift">
        <div class="card-body p-4 p-md-5">
          
          <div class="text-center mb-5">
            <div class="icon-circle mx-auto mb-3 pulse-primary">
              <i class="bi bi-award-fill"></i>
            </div>
            <h2 class="fw-bold text-dark mb-1">Examination Completed</h2>
            <p class="text-muted">Great effort! Here is your detailed performance report.</p>
          </div>

          <!-- Score Circle -->
          <div class="d-flex justify-content-center mb-5 animate-fade-in stagger-1">
            <div class="result-circle-container">
              <svg viewBox="0 0 100 100" class="w-100 h-100">
                <circle cx="50" cy="50" r="45" class="result-circle-bg" />
                <circle id="progress-circle" cx="50" cy="50" r="45" class="result-circle-progress" 
                        stroke-dasharray="283" stroke-dashoffset="283" />
              </svg>
              <div id="percentage-display" class="position-absolute top-50 start-50 translate-middle h2 fw-bold mb-0 text-primary">
                0%
              </div>
            </div>
          </div>

          <!-- Performance Card -->
          <div id="performance-card" class="p-3 rounded-pill text-center fw-bold mb-5 animate-fade-in stagger-2">
          </div>

          <!-- Summary Grid -->
          <div class="card bg-light border-0 mb-5 animate-fade-in stagger-3 hover-lift">
            <div class="card-body">
              <div class="d-flex align-items-center gap-2 mb-4 border-bottom pb-2">
                <i class="bi bi-list-check text-primary"></i>
                <h3 class="h6 fw-bold text-uppercase mb-0" style="letter-spacing: 0.05em">Detailed Summary</h3>
              </div>
              <div id="summary-grid" class="row g-4">
                <!-- Injected via JS -->
              </div>
            </div>
          </div>

          <!-- Export Buttons -->
          <div class="d-flex flex-wrap justify-content-center gap-3 animate-fade-in stagger-4">
            <button id="excel-btn" class="btn btn-success px-4 d-flex align-items-center gap-2 hover-lift">
              <i class="bi bi-file-earmark-excel-fill"></i> Export Excel
            </button>
            <button id="pdf-btn" class="btn btn-danger px-4 d-flex align-items-center gap-2 hover-lift">
              <i class="bi bi-file-earmark-pdf-fill"></i> Download PDF
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="results.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
